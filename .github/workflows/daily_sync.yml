name: Daily Stock Data Sync

on:
  schedule:
    # Runs daily at 21:00 UTC (Which is 2:30 AM IST, after market close)
    - cron: '0 21 * * *'
  workflow_dispatch: # Allows you to manually trigger the sync from GitHub UI at any time

jobs:
  sync-stocks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Spins up 5 instances running in parallel
        instance_index: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Database Sync Batch
      env:
        DB_TYPE: azure
        # Secure credentials loaded from GitHub Secrets
        AZURE_POSTGRES_URL: ${{ secrets.AZURE_POSTGRES_URL }}
        # Load unique Finnhub key for each of the 5 instances
        FINNHUB_API_KEY: ${{ secrets[format('FINNHUB_API_KEY_{0}', matrix.instance_index)] }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        
        # Batch size and throttling sleep
        SUB_BATCH_SIZE: 70
        BATCH_SLEEP_SECONDS: 4200
        
        # Slicing parameters for this matrix job
        INSTANCE_INDEX: ${{ matrix.instance_index }}
        TOTAL_INSTANCES: 5
      run: |
        python database/cron_update_runner.py --force
